  espressif/esp_lvgl_port:
    version: "^2.5.0"
  lvgl/lvgl:
    version: "~9.2.2"
    public: true
  mydazy/esp_lcd_jd9853:
    version: "^2.0.0"
  mydazy/esp_lcd_touch_axs5106l:
    version: "^2.0.0"
